name: Deploy Client to Google Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - 'shared/**'
      - '.github/workflows/deploy-cliente.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  ARTIFACT_REPOSITORY: emergency-assistance
  SERVICE_NAME: emergency-assistance-client
  API_BASE_URL: https://emergency-assistance-server-800711608362.asia-northeast2.run.app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Fetch VITE_API_URL from Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v3
        with:
          secrets: |-
            VITE_API_URL:projects/${{ env.PROJECT_ID }}/secrets/VITE_API_URL/versions/latest

      - name: Authorize Docker Push
        run: |
          gcloud auth configure-docker "asia-northeast2-docker.pkg.dev" --quiet

      - name: Prepare Client Build Assets
        run: |
          cat > client/cloudrun-server.mjs <<'EOF'
          import http from 'node:http';
          import fs from 'node:fs';
          import path from 'node:path';
          import url from 'node:url';

          const __dirname = path.dirname(url.fileURLToPath(import.meta.url));
          const distDir = path.join(__dirname, 'dist');
          const port = Number(process.env.PORT || 8080);
          const runtimeConfig = `window.runtimeConfig = ${JSON.stringify({
            API_BASE_URL: process.env.API_BASE_URL || '',
          })};\n`;

          fs.writeFileSync(path.join(distDir, 'runtime-config.js'), runtimeConfig, 'utf8');

          const mimeTypes = new Map([
            ['.html', 'text/html; charset=utf-8'],
            ['.js', 'application/javascript; charset=utf-8'],
            ['.mjs', 'application/javascript; charset=utf-8'],
            ['.css', 'text/css; charset=utf-8'],
            ['.json', 'application/json; charset=utf-8'],
            ['.svg', 'image/svg+xml'],
            ['.png', 'image/png'],
            ['.jpg', 'image/jpeg'],
            ['.jpeg', 'image/jpeg'],
            ['.ico', 'image/x-icon'],
          ]);

          const sendFile = (res, filePath) => {
            const ext = path.extname(filePath);
            res.setHeader('Content-Type', mimeTypes.get(ext) || 'application/octet-stream');
            fs.createReadStream(filePath).pipe(res);
          };

          const server = http.createServer((req, res) => {
            const requestPath = new URL(req.url, `http://${req.headers.host}`).pathname;
            const safePath = requestPath === '/' ? '/index.html' : requestPath;
            const filePath = path.join(distDir, safePath);

            if (fs.existsSync(filePath) && fs.statSync(filePath).isFile()) {
              sendFile(res, filePath);
              return;
            }

            sendFile(res, path.join(distDir, 'index.html'));
          });

          server.listen(port, '0.0.0.0', () => {
            console.log(`Client server listening on ${port}`);
          });
          EOF

          cat > client/Dockerfile.cloudrun <<'EOF'
          FROM node:20-alpine AS build
          WORKDIR /app

          ARG VITE_API_URL
          ARG VITE_API_BASE_URL
          ENV VITE_API_URL=${VITE_API_URL}
          ENV VITE_API_BASE_URL=${VITE_API_BASE_URL}

          COPY client/package*.json ./client/
          WORKDIR /app/client
          RUN npm install

          WORKDIR /app
          COPY shared ./shared
          COPY client ./client

          WORKDIR /app/client
          RUN npm run build

          FROM node:20-alpine
          WORKDIR /app/client
          ENV NODE_ENV=production
          ENV PORT=8080
          COPY --from=build /app/client/dist ./dist
          COPY --from=build /app/client/cloudrun-server.mjs ./cloudrun-server.mjs
          EXPOSE 8080
          CMD ["node", "cloudrun-server.mjs"]
          EOF

          echo "IMAGE_URI=asia-northeast2-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/client:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Build and Push Container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client/Dockerfile.cloudrun
          push: true
          tags: ${{ env.IMAGE_URI }}
          build-args: |
            VITE_API_URL=${{ steps.secrets.outputs.VITE_API_URL }}
            VITE_API_BASE_URL=${{ steps.secrets.outputs.VITE_API_URL }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --image "${IMAGE_URI}" \
            --region asia-northeast2 \
            --platform managed \
            --project "${PROJECT_ID}" \
            --set-env-vars "API_BASE_URL=${API_BASE_URL}" \
            --allow-unauthenticated \
            --quiet