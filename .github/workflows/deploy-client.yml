name: Deploy Client to Google Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - 'shared/**'
      - '.github/workflows/deploy-client.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  ARTIFACT_REPOSITORY: emergency-assistance
  SERVICE_NAME: emergency-assistance-client

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Fetch VITE_API_URL from Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v3
        with:
          secrets: |-
            VITE_API_URL:${{ env.PROJECT_ID }}/VITE_API_URL

# ▼▼▼ このステップを追加 ▼▼▼
      - name: Debug Secret Value
        run: |
          echo "VITE_API_URL length: ${#SECRET_VAL}"
        env:
          SECRET_VAL: ${{ steps.secrets.outputs.VITE_API_URL }}
      # ▲▲▲ ここまで ▲▲▲

      - name: Authorize Docker Push
        run: |
          gcloud auth configure-docker "asia-northeast2-docker.pkg.dev" --quiet

      - name: Set Image URI
        run: |
          echo "IMAGE_URI=asia-northeast2-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/client:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Build and Push Container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client/Dockerfile
          push: true
          tags: ${{ env.IMAGE_URI }}
          build-args: |
            VITE_API_URL=${{ steps.secrets.outputs.VITE_API_URL }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --image "${IMAGE_URI}" \
            --region asia-northeast2 \
            --platform managed \
            --project "${PROJECT_ID}" \
            --allow-unauthenticated \
            --quiet

     
      
