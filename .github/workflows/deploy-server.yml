name: Deploy Server to Google Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'shared/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/deploy-server-AppCervce.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  ARTIFACT_REPOSITORY: ${{ vars.GCP_ARTIFACT_REPOSITORY }}
  SERVICE_NAME: ${{ vars.GCP_SERVER_SERVICE_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Authorize Docker Push
        run: |
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and Push Container
        run: |
          cat > server/Dockerfile.cloudrun <<'EOF'
          FROM node:20-slim
          WORKDIR /app

          COPY server/package*.json ./server/
          WORKDIR /app/server
          RUN npm install --omit=dev

          WORKDIR /app
          COPY shared ./shared
          COPY server ./server

          WORKDIR /app/server
          ENV NODE_ENV=production
          ENV PORT=8080
          EXPOSE 8080
          CMD ["node", "azure-server.mjs"]
          EOF

          IMAGE_URI="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/server:${GITHUB_SHA}"
          docker build -f server/Dockerfile.cloudrun -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --image "${IMAGE_URI}" \
            --region "${REGION}" \
            --platform managed \
            --project "${PROJECT_ID}" \
            --allow-unauthenticated \
            --quiet
