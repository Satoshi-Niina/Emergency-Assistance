name: Deploy to Cloud Run (Minimal)

on:
  push:
    branches:
      - main  # またはご自身のデフォルトブランチ名 (master 等)
  workflow_dispatch: # GitHubの画面から手動実行もできるように設定

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: asia-northeast1             # リージョン（例: 東京）
  SERVICE_NAME: maint-vehicle-management    # 作成する Cloud Run サービス名
  REPOSITORY_NAME: cloud-run-source-deploy  # Artifact Registryのリポジトリ名

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. リポジトリのチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Google GCP 認証 (サービスアカウントキーを使用)
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3. gcloud CLI のセットアップ
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 4. Artifact Registry への Docker ログイン認証
      - name: Authorize Docker push
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      # 5. Cloud Run への最小デプロイ (Dockerfile なしの source deploy)
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --source . \
            --region "${{ env.GAR_LOCATION }}" \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --quiet