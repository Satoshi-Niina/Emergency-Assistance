name: Deploy to Cloud Run (Minimal)

on:
  push:
    branches:
      - main  # またはご自身のデフォルトブランチ名 (master 等)
  workflow_dispatch: # GitHubの画面から手動実行もできるように設定

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: asia-northeast1             # リージョン（例: 東京）
  SERVICE_NAME: maint-vehicle-management    # 作成する Cloud Run サービス名
  REPOSITORY_NAME: cloud-run-source-deploy  # Artifact Registryのリポジトリ名

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. リポジトリのチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Google GCP 認証 (サービスアカウントキーを使用)
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3. gcloud CLI のセットアップ
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 4. Artifact Registry への Docker ログイン認証
      - name: Authorize Docker push
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      # 5. Docker イメージのビルドと push
      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # 6. Cloud Run への最小デプロイ (環境変数なし)
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GAR_LOCATION }}
          image: ${{ env.IMAGE_TAG }}
          # あえて env_vars や secrets は指定していません